version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dentallab-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    depends_on:
      - db
      - redis
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=dentallab
      - DB_USERNAME=dentallab
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    networks:
      - dentallab

  nginx:
    image: nginx:alpine
    container_name: dentallab-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - dentallab

  db:
    image: mysql:8.0
    container_name: dentallab-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: dentallab
      MYSQL_USER: dentallab
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - dentallab

  redis:
    image: redis:alpine
    container_name: dentallab-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - dentallab

  node:
    image: node:18-alpine
    container_name: dentallab-node
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    networks:
      - dentallab

networks:
  dentallab:
    driver: bridge

volumes:
  dbdata:
    driver: local
